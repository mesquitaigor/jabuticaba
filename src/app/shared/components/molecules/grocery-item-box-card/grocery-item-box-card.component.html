@if (groceryItem(); as groceryItemData) {
  <p-card
    data-testid="grocery-item-card"
    [class]="
      'h-full flex flex-col shadow-sm border border-gray-200 hover:shadow-md transition-all duration-300 cursor-pointer relative aspect-square'
    "
    [class.opacity-60]="groceryItemData.missing"
    (click)="!isEditing() && toggleMissingStatus($event)"
  >
    <!-- Checkbox no canto superior esquerdo -->
    @if (!isEditing()) {
      <div class="absolute top-2 left-2 z-10">
        <p-checkbox
          data-testid="missing-checkbox"
          [ngModel]="groceryItemData.missing"
          [binary]="true"
          (click)="toggleMissingStatus($event)"
        ></p-checkbox>
      </div>
    }

    <div class="flex flex-col items-center justify-center flex-1">
      <!-- Ícone centralizado -->
      <div
        data-testid="icon-container"
        class="flex-shrink-0 w-16 h-16 rounded-lg flex items-center justify-center overflow-hidden mb-2 mt-4"
      >
        <i
          data-testid="item-icon"
          class="pi pi-shopping-cart text-gray-600"
          style="font-size: 2rem"
        ></i>
      </div>

      <!-- Nome abaixo do ícone -->
      <div class="flex-1 min-w-0 text-center mb-4">
        @if (!isEditing()) {
          <h3
            data-testid="item-name"
            class="text-sm font-semibold text-gray-700 leading-5 break-words m-0"
          >
            {{ groceryItemData.name || "Item sem nome" }}
          </h3>
        } @else {
          <input
            data-testid="name-input"
            pInputText
            type="text"
            [ngModel]="editableName()"
            (ngModelChange)="editableName.set($event)"
            class="w-full text-sm font-semibold text-gray-700 text-center border-none outline-none"
            #nameInput
          />
        }
      </div>

      <!-- Botões na parte inferior -->
      <div class="flex gap-2 justify-center absolute top-2 right-2">
        @if (!isEditing()) {
          <p-button
            data-testid="edit-button"
            icon="pi pi-pencil"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            size="small"
            [ariaLabel]="'Editar ' + (groceryItemData.name || 'item')"
            pTooltip="Editar item"
            (click)="onEdit()"
          />
        } @else {
          <p-button
            data-testid="delete-button"
            icon="pi pi-trash"
            [text]="true"
            [rounded]="true"
            severity="danger"
            size="small"
            [ariaLabel]="'Excluir ' + (groceryItemData.name || 'item')"
            pTooltip="Excluir item"
            (click)="onDelete()"
          />
          <p-button
            data-testid="cancel-button"
            icon="pi pi-times"
            [text]="true"
            [rounded]="true"
            severity="secondary"
            size="small"
            ariaLabel="Cancelar"
            pTooltip="Cancelar"
            (click)="onCancelEdit()"
          />
        }
      </div>
    </div>
  </p-card>
}
