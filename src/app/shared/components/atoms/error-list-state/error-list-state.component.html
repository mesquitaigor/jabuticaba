<div class="p-8 text-center text-gray-500" [jbtDataTestid]="testId">
  <img src="error.svg" alt="Error" class="w-40 h-40 mb-4 mx-auto translate-5" />
  <p>Erro ao carregar itens</p>
  <p-button
    class="mt-4 inline-block"
    icon="pi pi-reload"
    label="Recarregar"
    [outlined]="true"
    severity="secondary"
    (onClick)="reloadList.emit()"
  ></p-button>
</div>
