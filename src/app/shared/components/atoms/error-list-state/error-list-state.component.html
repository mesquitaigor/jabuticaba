<div class="p-8 text-center text-gray-500" [jbtDataTestid]="testId">
  <img src="error.svg" alt="Error" class="w-60 h-60 mb-4 mx-auto" />
  <h1 class="text-xl font-bold">Oops!</h1>
  <p>Algo está errado</p>
  <p-button
    class="mt-4 inline-block"
    icon="pi pi-reload"
    label="Recarregar"
    [outlined]="true"
    severity="secondary"
    (onClick)="reloadList.emit()"
  ></p-button>
</div>
