<div class="flex flex-col gap-4">
  <div class="w-full flex justify-center">
    <div
      class="cursor-pointer relative w-30 h-30 rounded-full bg-gray-100 flex items-center justify-center"
      (click)="openIconSelectionDialog()"
      (keypress)="openIconSelectionDialog()"
      tabindex="0"
    >
      <jbt-grocery-item-icon
        [iconName]="item?.icon"
        iconSize="[60%]"
        [jbtDataTestid]="testIds.ItemIcon"
      ></jbt-grocery-item-icon>
    </div>
  </div>
  <input
    id="itemName"
    pInputText
    type="text"
    placeholder="Digite o nome do item"
    [formControl]="itemNameControl"
    [jbtDataTestid]="testIds.NewItemInput"
  />
</div>
<div class="flex justify-end gap-2 mt-8">
  <p-button
    label="Cancelar"
    severity="secondary"
    [outlined]="true"
    (onClick)="handleCancel()"
    [jbtDataTestid]="testIds.RegistryCancelButton"
  />
  <p-button
    [disabled]="saveButtonDisabledStt()"
    [label]="executing() ? 'Adicionando...' : 'Adicionar'"
    severity="primary"
    (onClick)="exec()"
    [jbtDataTestid]="testIds.SaveButton"
  />
</div>
