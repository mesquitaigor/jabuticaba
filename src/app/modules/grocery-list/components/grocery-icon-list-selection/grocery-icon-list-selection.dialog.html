<div class="p-4 w-full flex align-center justify-center mb-4">
  <div class="p-6">
    <jbt-grocery-item-icon
      iconSize="20"
      [iconName]="showingIcon()"
    ></jbt-grocery-item-icon>
  </div>
</div>
<div class="flex wrap gap-4 justify-center">
  @for (icon of icons(); track icon) {
    <jbt-grocery-item-icon
      (mouseEnter)="setPreviewIcon(icon)"
      (mouseLeave)="resetPreviewIcon()"
      (click)="selectIcon(icon)"
      [iconName]="icon"
    ></jbt-grocery-item-icon>
  }
</div>
<div class="flex justify-end gap-2 mt-8">
  <p-button
    label="Cancelar"
    severity="secondary"
    [outlined]="true"
    (onClick)="handleCancel()"
    [jbtDataTestid]="testIds.CancelButton"
  />
  <p-button
    [disabled]="saveButtonDisabledStt()"
    [label]="saving() ? 'Adicionando...' : 'Adicionar'"
    severity="primary"
    (onClick)="save()"
    [jbtDataTestid]="testIds.SaveButton"
  />
</div>
